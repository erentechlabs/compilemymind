# =============================================================================
# Compile My Mind — Hugo Configuration
# Theme: hugo-mana-theme (https://github.com/Livour/hugo-mana-theme)
# Focus: Cybersecurity · IT Infrastructure · Cloud · Systems
# =============================================================================

baseURL = "https://www.compilemymind.com/"
title = "Compile My Mind"
theme = "mana"
defaultContentLanguage = "en"

enableRobotsTXT = true

# =============================================================================
# Pagination
# =============================================================================
paginate = 12

# =============================================================================
# Markup & Syntax Highlighting
# =============================================================================
[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "catppuccin-macchiato"

# =============================================================================
# Outputs — JSON required for search functionality
# =============================================================================
[outputs]
  home = ["HTML", "JSON"]

# =============================================================================
# Sitemap
# =============================================================================
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# =============================================================================
# Site Parameters
# =============================================================================
[params]
  enableIntegrity = false
  relatedPostsCount = 4

  description = "Practical guides, deep dives, and cheatsheets on cybersecurity, networking, cloud, IT infrastructure, and the systems that keep digital environments running."
  author = "Eren"
  heroTitleLine1 = "COMPILE MY MIND"
  heroTitleLine2 = "Cybersecurity · IT · Cloud"
  custom404Message = "Page not found - even good recon turns up nothing sometimes."

  # Favicon
  favicon = "/favicon.ico"
  defaultImage = "/og-default.png"

  [params.favicons]
    version = "20260531-purple-network-icon"

  # Social Links (add yours below)
  [params.social]
    # github   = "https://github.com/yourusername"
    # linkedin = "https://www.linkedin.com/in/yourprofile"
    # twitter  = "yourusername"

  # Avatar — using existing icon from assets/
  [params.avatar]
    [params.avatar.home]
      assetPath    = "icon.svg"
      enableResize = false

  # Buy Me a Coffee (disabled)
  [params.buyMeACoffee]
    enabled = false

  # Syntax highlighting themes (dark: Catppuccin Macchiato, light: Catppuccin Frappe)
  [params.codeHighlight]
    darkTheme  = "catppuccin-macchiato"
    lightTheme = "catppuccin-frappe"

  # Admonitions / alerts style
  [params.admonitions]
    alertStyle = "favicon"


  # Verification meta tags
  [params.verification]
    bing   = "AA4E4F8297B73C961E16F3A4FE57D87D"
    yandex = "8865729cd882d7e9"

# =============================================================================
# Navigation Menu
# =============================================================================
[[menus.main]]
  name    = "Home"
  pageRef = "/"
  weight  = 10

[[menus.main]]
  name    = "Posts"
  pageRef = "/posts"
  weight  = 20

[[menus.main]]
  name    = "Topics"
  pageRef = "/topics"
  weight  = 25

[[menus.main]]
  name    = "Tags"
  pageRef = "/tags"
  weight  = 30
