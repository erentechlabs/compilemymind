name: Setup pinned Hugo
description: Install the Hugo Extended release pinned in .hugo-version.

runs:
  using: composite
  steps:
    - name: Read pinned version
      id: version
      shell: bash
      run: echo "value=$(tr -d '\r\n' < .hugo-version)" >> "$GITHUB_OUTPUT"

    - name: Install Hugo Extended
      shell: bash
      run: |
        set -euo pipefail
        version="${{ steps.version.outputs.value }}"
        archive="hugo_extended_${version}_linux-amd64.tar.gz"
        target="$RUNNER_TEMP/hugo-${version}"
        mkdir -p "$target"
        curl --fail --location --retry 3 --output "$RUNNER_TEMP/$archive" "https://github.com/gohugoio/hugo/releases/download/v${version}/$archive"
        tar -xzf "$RUNNER_TEMP/$archive" -C "$target" hugo
        chmod +x "$target/hugo"
        echo "$target" >> "$GITHUB_PATH"
        "$target/hugo" version
