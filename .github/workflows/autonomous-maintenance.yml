name: Autonomous content maintenance

on:
  schedule:
    - cron: "31 2 * * 1,4"
  workflow_dispatch:

concurrency:
  group: autonomous-maintenance-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  deployments: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_TEXT_MODEL: ${{ vars.GEMINI_TEXT_MODEL }}
      GEMINI_QA_MODEL: ${{ vars.GEMINI_QA_MODEL }}
      GEMINI_GROUNDED_RESEARCH_MODEL: ${{ vars.GEMINI_GROUNDED_RESEARCH_MODEL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read pinned Hugo version
        id: hugo-version
        shell: bash
        run: echo "version=$(tr -d '\r\n' < .hugo-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ steps.hugo-version.outputs.version }}
          extended: true

      - name: Review links and stale facts
        run: python tools/autopublisher/autopublisher.py --mode maintain

      - name: Rebuild and validate maintained site
        run: |
          git diff --check
          hugo --minify

      - name: Commit and push approved maintenance
        id: commit
        shell: bash
        run: |
          git config user.name "compilemymind-maintenance[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- content/posts .autopublisher/state.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No maintenance changes were required."
            exit 0
          fi
          git add content/posts .autopublisher/state.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(content): autonomous maintenance"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PAGES_PROJECT != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ github.token }}
          command: pages deploy public --project-name=$CLOUDFLARE_PAGES_PROJECT --branch=${{ github.ref_name }}

      - name: Report deployment configuration
        if: steps.commit.outputs.changed == 'true' && (env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_PAGES_PROJECT == '')
        run: echo "Maintenance was pushed. Cloudflare Pages must use its Git integration, or the three optional Cloudflare settings must be configured for direct deployment."

      - name: Upload maintenance logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-maintenance-${{ github.run_id }}
          path: .autopublisher/logs/
          if-no-files-found: ignore
          retention-days: 30
