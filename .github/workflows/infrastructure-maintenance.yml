name: Infrastructure Maintenance

on:
  schedule:
    - cron: "23 3 1 1,7 *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: infrastructure-maintenance
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare safe framework and tooling updates
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Hugo helper
        shell: bash
        run: |
          cat > /tmp/install-hugo.sh <<'EOF'
          set -euo pipefail
          HUGO_VERSION="$1"
          curl -fsSL -o /tmp/hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo mv /tmp/hugo /usr/local/bin/hugo
          hugo version
          EOF
          chmod +x /tmp/install-hugo.sh

      - name: Install current Hugo
        shell: bash
        run: /tmp/install-hugo.sh "$(tr -d '[:space:]' < .hugo-version)"

      - name: Prepare candidate updates
        run: python tools/autopublisher/infra_maintenance.py --apply-safe-updates

      - name: Validate candidate Hugo version
        shell: bash
        run: |
          set -euo pipefail
          /tmp/install-hugo.sh "$(tr -d '[:space:]' < .hugo-version)"
          hugo --minify

      - name: Create pull request when changes exist
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --short -- .hugo-version themes/mana/package.json themes/mana/package-lock.json)" ]; then
            echo "No safe infrastructure changes were prepared."
            exit 0
          fi
          REPORT="$(ls -1t .autopublisher/reports/infrastructure-maintenance-*.md | head -n 1)"
          BRANCH="codex/autonomous-infra-maintenance-${GITHUB_RUN_ID}"
          git config user.name "compilemymind-maintenance"
          git config user.email "actions@github.com"
          git checkout -b "${BRANCH}"
          git add .hugo-version themes/mana/package.json .autopublisher/reports
          if [ -f themes/mana/package-lock.json ]; then
            git add themes/mana/package-lock.json
          fi
          git commit -m "chore: prepare infrastructure maintenance updates"
          git push --set-upstream origin "${BRANCH}"
          gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "${BRANCH}" \
            --title "chore: infrastructure maintenance updates" \
            --body-file "${REPORT}"
