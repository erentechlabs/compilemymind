name: Infrastructure maintenance

on:
  schedule:
    - cron: "0 4 1 * *"
  workflow_dispatch:

concurrency:
  group: infrastructure-maintenance-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  maintain-infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ github.token }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read pinned Hugo version
        id: hugo-version
        shell: bash
        run: echo "version=$(tr -d '\r\n' < .hugo-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Hugo Extended
        shell: bash
        run: |
          version="${{ steps.hugo-version.outputs.version }}"
          archive="hugo_extended_${version}_linux-amd64.tar.gz"
          mkdir -p "$RUNNER_TEMP/hugo"
          curl --fail --location --retry 3 --output "$RUNNER_TEMP/$archive" "https://github.com/gohugoio/hugo/releases/download/v${version}/$archive"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/hugo" hugo
          chmod +x "$RUNNER_TEMP/hugo/hugo"
          echo "$RUNNER_TEMP/hugo" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/hugo/hugo" version

      - name: Save infrastructure baseline
        shell: bash
        run: |
          cp .hugo-version "$RUNNER_TEMP/original-hugo-version"
          if test -f themes/mana/package-lock.json; then
            cp themes/mana/package-lock.json "$RUNNER_TEMP/original-package-lock.json"
          fi

      - name: Check and prepare automatic updates
        id: infra
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python tools/autopublisher/infra_maintenance.py --apply-safe-updates > infra-result.json
          status=$?
          cat infra-result.json
          if test -s infra-result.json; then
            manual_review=$(python -c 'import json; print(str(json.load(open("infra-result.json", encoding="utf-8")).get("manual_review_required", False)).lower())')
            report=$(python -c 'import json; print(json.load(open("infra-result.json", encoding="utf-8")).get("report", ""))')
            echo "manual_review=$manual_review" >> "$GITHUB_OUTPUT"
            echo "report=$report" >> "$GITHUB_OUTPUT"
          else
            echo "manual_review=false" >> "$GITHUB_OUTPUT"
          fi
          exit $status

      - name: Validate selected Hugo release
        id: hugo_candidate
        if: steps.infra.outcome == 'success' && steps.infra.outputs.manual_review != 'true'
        shell: bash
        run: |
          original_version="$(tr -d '\r\n' < "$RUNNER_TEMP/original-hugo-version")"
          selected_version="$(tr -d '\r\n' < .hugo-version)"
          if test "$original_version" = "$selected_version"; then
            echo "No Hugo version change requires a second candidate build."
            exit 0
          fi

          archive="hugo_extended_${selected_version}_linux-amd64.tar.gz"
          install_dir="$RUNNER_TEMP/hugo-selected"
          rm -rf "$install_dir"
          mkdir -p "$install_dir"
          curl --fail --location --retry 3 --output "$RUNNER_TEMP/$archive" "https://github.com/gohugoio/hugo/releases/download/v${selected_version}/$archive"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$install_dir" hugo
          chmod +x "$install_dir/hugo"
          "$install_dir/hugo" version

          if ! "$install_dir/hugo" --minify; then
            echo "The selected Hugo release failed its candidate build; restoring the previous version."
            cp "$RUNNER_TEMP/original-hugo-version" .hugo-version
            if test -f "$RUNNER_TEMP/original-package-lock.json"; then
              cp "$RUNNER_TEMP/original-package-lock.json" themes/mana/package-lock.json
            fi
            exit 1
          fi

      - name: Upload infrastructure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: infrastructure-maintenance-${{ github.run_id }}
          path: |
            infra-result.json
            .autopublisher/reports/
          if-no-files-found: ignore
          retention-days: 180

      - name: Stop after a failed regression test
        if: always() && (steps.infra.outcome == 'failure' || steps.hugo_candidate.outcome == 'failure')
        run: exit 1

      - name: Synchronize Hugo version with Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PAGES_PROJECT != ''
        run: python tools/maintenance/sync_cloudflare_hugo.py

      - name: Prepare a draft review PR for risky updates
        if: steps.infra.outputs.manual_review == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          branch="automation/infrastructure-review-${GITHUB_RUN_ID}"
          git config user.name "compilemymind-infrastructure[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add .autopublisher/reports
          git commit -m "chore(infra): prepare maintenance review"
          git push --set-upstream origin "$branch"
          gh pr create \
            --draft \
            --base "${GITHUB_REF_NAME}" \
            --head "$branch" \
            --title "Infrastructure maintenance review (${GITHUB_RUN_ID})" \
            --body-file "${{ steps.infra.outputs.report }}"

      - name: Commit validated automatic updates
        id: commit
        if: steps.infra.outputs.manual_review != 'true'
        shell: bash
        run: |
          git config user.name "compilemymind-infrastructure[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .autopublisher/reports .hugo-version
          if test -f themes/mana/package-lock.json; then git add themes/mana/package-lock.json; fi
          if git diff --cached --quiet; then
            echo "No validated infrastructure updates were ready to commit."
            exit 0
          fi
          git commit -m "chore(infra): apply validated maintenance updates"
          git push origin "HEAD:${GITHUB_REF_NAME}"
