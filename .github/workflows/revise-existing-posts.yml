name: Revise existing posts

on:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

concurrency:
  group: autonomous-content-${{ github.ref }}
  # A later run must supersede queued work so it cannot execute a stale
  # publisher revision after content or validation logic changes.
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  revise:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_TEXT_MODEL: ${{ vars.GEMINI_TEXT_MODEL }}
      GEMINI_QA_MODEL: ${{ vars.GEMINI_QA_MODEL }}
      GEMINI_GROUNDED_RESEARCH_MODEL: ${{ vars.GEMINI_GROUNDED_RESEARCH_MODEL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Synchronize with the latest main revision
        shell: bash
        run: |
          branch="${{ github.event.repository.default_branch }}"
          git fetch --no-tags origin "+refs/heads/$branch:refs/remotes/origin/$branch"
          git checkout --detach "origin/$branch"
          echo "Using publisher revision $(git rev-parse HEAD) from origin/$branch"

      - name: Report publisher revision
        shell: bash
        run: echo "Autonomous publisher revision $(git rev-parse HEAD) from $(git branch --show-current)"

      - name: Read pinned Hugo version
        id: hugo-version
        shell: bash
        run: echo "version=$(tr -d '\r\n' < .hugo-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install publishing validators
        run: python -m pip install --requirement tools/autopublisher/requirements.txt

      - name: Run deterministic publishing tests
        run: |
          python -m unittest discover -s tools/autopublisher -p "test_*.py"
          python -m unittest discover -s tools/ci -p "test_*.py"
          python -m unittest discover -s tools/maintenance -p "test_*.py"

      - name: Install Hugo Extended
        shell: bash
        run: |
          version="${{ steps.hugo-version.outputs.version }}"
          archive="hugo_extended_${version}_linux-amd64.tar.gz"
          mkdir -p "$RUNNER_TEMP/hugo"
          curl --fail --location --retry 3 --output "$RUNNER_TEMP/$archive" "https://github.com/gohugoio/hugo/releases/download/v${version}/$archive"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/hugo" hugo
          chmod +x "$RUNNER_TEMP/hugo/hugo"
          echo "$RUNNER_TEMP/hugo" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/hugo/hugo" version

      - name: Rewrite one existing post with Gemini and QA
        run: python tools/autopublisher/revise_posts.py --max-posts 1

      - name: Run shared release gate
        run: python tools/ci/release_gate.py --mode revision

      - name: Commit and push approved revision
        id: commit
        shell: bash
        run: |
          git config user.name "compilemymind-editorial[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- content/posts .autopublisher/revision-state.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No approved revision was produced."
            exit 0
          fi
          git add content/posts .autopublisher/revision-state.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(content): improve existing article readability"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Upload revision logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: revise-existing-posts-${{ github.run_id }}
          path: .autopublisher/logs/
          if-no-files-found: ignore
          retention-days: 30
