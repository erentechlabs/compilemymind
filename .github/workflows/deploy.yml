name: Deploy production site

on:
  push:
    branches: [main]
    paths-ignore:
      - ".content-pipeline/state.json"
      - ".content-pipeline/logs/**"
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate source-backed editorial backlog
        run: python tools/content_pipeline/publish.py --mode validate
      - uses: ./.github/actions/setup-hugo
      - name: Build the production artifact
        run: hugo --gc --minify --cleanDestinationDir --destination public
      - name: Verify Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        shell: bash
        run: |
          set -euo pipefail
          for setting in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_PAGES_PROJECT; do
            test -n "${!setting}" || { echo "::error title=Missing Cloudflare secret::$setting is required."; exit 1; }
          done
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy public --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=main
