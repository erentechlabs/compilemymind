name: Deploy Hugo site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read pinned Hugo version
        id: hugo-version
        shell: bash
        run: echo "version=$(tr -d '\r\n' < .hugo-version)" >> "$GITHUB_OUTPUT"

      - name: Install Hugo Extended
        shell: bash
        run: |
          version="${{ steps.hugo-version.outputs.version }}"
          archive="hugo_extended_${version}_linux-amd64.tar.gz"
          mkdir -p "$RUNNER_TEMP/hugo"
          curl --fail --location --retry 3 --output "$RUNNER_TEMP/$archive" "https://github.com/gohugoio/hugo/releases/download/v${version}/$archive"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/hugo" hugo
          chmod +x "$RUNNER_TEMP/hugo/hugo"
          echo "$RUNNER_TEMP/hugo" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/hugo/hugo" version

      - name: Synchronize Hugo version with Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PAGES_PROJECT != ''
        run: python3 tools/maintenance/sync_cloudflare_hugo.py

      - name: Run shared release gate
        run: python3 tools/ci/release_gate.py --mode validate

      - name: Report deployment configuration
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_PAGES_PROJECT == ''
        run: echo "Hugo build passed. Cloudflare Pages Git integration will deploy the site; API synchronization was skipped because its settings are incomplete."
