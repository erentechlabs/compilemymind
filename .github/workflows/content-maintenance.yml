name: Content Maintenance

on:
  schedule:
    - cron: "41 2 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: content-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    name: Review existing articles and repair content
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hugo from .hugo-version
        shell: bash
        run: |
          set -euo pipefail
          HUGO_VERSION="$(tr -d '[:space:]' < .hugo-version)"
          curl -fsSL -o /tmp/hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo mv /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Run content maintenance
        run: python tools/autopublisher/autopublisher.py --mode maintain

      - name: Commit approved maintenance changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- content .autopublisher/state.json; then
            echo "No content maintenance changes to publish."
            exit 0
          fi
          git config user.name "compilemymind-autopublisher"
          git config user.email "actions@github.com"
          git add content .autopublisher/state.json
          git commit -m "chore(content): autonomous article maintenance"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload maintenance logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-maintenance-logs
          path: .autopublisher/logs/
          if-no-files-found: ignore
          retention-days: 30
