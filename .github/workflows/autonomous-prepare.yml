name: Prepare autonomous publications

on:
  push:
    branches:
      - main
    paths:
      - ".autopublisher/prepare-now"
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

concurrency:
  group: repository-write-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_MODELS_TOKEN: ${{ github.token }}
      GEMINI_TEXT_MODEL: ${{ vars.GEMINI_TEXT_MODEL }}
      GEMINI_QA_MODEL: ${{ vars.GEMINI_QA_MODEL }}
      GEMINI_GROUNDED_RESEARCH_MODEL: ${{ vars.GEMINI_GROUNDED_RESEARCH_MODEL }}
      GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Synchronize with the latest main revision
        shell: bash
        run: |
          branch="${{ github.event.repository.default_branch }}"
          git fetch --no-tags origin "+refs/heads/$branch:refs/remotes/origin/$branch"
          git checkout --detach "origin/$branch"
          echo "Using preparation revision $(git rev-parse HEAD) from origin/$branch"

      - name: Read pinned Hugo version
        id: hugo-version
        shell: bash
        run: echo "version=$(tr -d '\r\n' < .hugo-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install publishing validators
        run: python -m pip install --requirement tools/autopublisher/requirements.txt

      - name: Run deterministic publishing tests
        run: |
          python -m unittest discover -s tools/autopublisher -p "test_*.py"
          python -m unittest discover -s tools/ci -p "test_*.py"
          python -m unittest discover -s tools/maintenance -p "test_*.py"

      - name: Install Hugo Extended
        shell: bash
        run: |
          version="${{ steps.hugo-version.outputs.version }}"
          archive="hugo_extended_${version}_linux-amd64.tar.gz"
          mkdir -p "$RUNNER_TEMP/hugo"
          curl --fail --location --retry 3 --output "$RUNNER_TEMP/$archive" "https://github.com/gohugoio/hugo/releases/download/v${version}/$archive"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/hugo" hugo
          chmod +x "$RUNNER_TEMP/hugo/hugo"
          echo "$RUNNER_TEMP/hugo" >> "$GITHUB_PATH"

      - name: Generate and validate one queue candidate
        run: python tools/autopublisher/autopublisher.py --mode prepare

      - name: Run shared preparation gate
        id: preparation_gate
        run: python tools/ci/release_gate.py --mode prepare

      - name: Commit approved queue bundle
        shell: bash
        run: |
          git config user.name "compilemymind-autopublisher[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          approved=$(python -c 'import json; from pathlib import Path; print(str(json.loads(Path(".autopublisher/release-gate-result.json").read_text(encoding="utf-8")).get("approved", False)).lower())')
          if test "$approved" != "true"; then
            if ! git diff --quiet -- .autopublisher/state.json; then
              git add .autopublisher/state.json
              git commit -m "chore(automation): record preparation retry [skip ci]"
              git push origin "HEAD:${GITHUB_REF_NAME}"
              echo "Preparation retry evidence was persisted without changing public content."
            fi
            echo "No approved publication was added to the ready queue."
            exit 0
          fi
          git add .autopublisher/state.json .autopublisher/queue/ready
          if git diff --cached --quiet; then
            echo "Preparation produced no durable queue change."
            exit 0
          fi
          git commit -m "chore(automation): queue approved publication [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Build autonomous monitoring report
        if: always()
        run: python tools/autopublisher/autopublisher.py --mode report

      - name: Upload preparation logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: autonomous-prepare-${{ github.run_id }}
          path: |
            .autopublisher/logs/
            .autopublisher/dashboard.json
          if-no-files-found: ignore
          retention-days: 30
