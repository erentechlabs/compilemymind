name: Gemini model maintenance

on:
  schedule:
    - cron: "13 5 15 * *"
  workflow_dispatch:

concurrency:
  group: gemini-model-maintenance-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  discover-and-upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_TEXT_MODEL: ${{ vars.GEMINI_TEXT_MODEL }}
      GEMINI_QA_MODEL: ${{ vars.GEMINI_QA_MODEL }}
      GEMINI_GROUNDED_RESEARCH_MODEL: ${{ vars.GEMINI_GROUNDED_RESEARCH_MODEL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Discover and smoke-test newer stable Gemini Flash model
        run: python tools/maintenance/gemini_model_maintenance.py

      - name: Commit activated model state
        shell: bash
        run: |
          if git diff --quiet -- .autopublisher/model-state.json; then
            echo "No newer compatible stable Gemini model was activated."
            exit 0
          fi
          git config user.name "compilemymind-model-maintenance[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .autopublisher/model-state.json
          git commit -m "chore(ai): activate newer stable Gemini model"
          git push origin "HEAD:${GITHUB_REF_NAME}"
