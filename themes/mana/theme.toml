# This is a config file for https://themes.gohugo.io/. Look at example.toml for the theme's config
name = "Mana"
license = "MIT"
licenselink = "https://github.com/Livour/hugo-mana-theme/blob/main/LICENSE"
description = "Cyber-inspired dark theme for technical blogs focused on security, infrastructure, systems, and cloud."
homepage = "https://github.com/Livour/hugo-mana-theme"
demosite = "https://managuide.blog/"

tags = ["blog", "responsive", "personal", "dark", "cybersecurity", "infrastructure", "systems", "code-highlighting", "light", "dark mode", "light mode", "multilingual"]
features = ["responsive", "dark mode", "light mode", "blog", "social icons", "code highlighting", "clean design", "sticky header", "search", "table of contents", "syntax highlighting", "post filtering", "tag search", "archive pages", "multilingual"]

[author]
  name = "Livour"
  homepage = "https://github.com/Livour"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.162.1"

