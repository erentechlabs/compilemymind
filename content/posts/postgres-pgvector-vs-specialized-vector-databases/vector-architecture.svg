<title id="title">Unified Postgres vs. Split Vector Database Architecture</title>
<desc id="desc">A flowchart for Unified Postgres vs. Split Vector Database Architecture</desc>
<text x="600.0" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Unified Postgres vs. Split Vector Database Architecture</text>
