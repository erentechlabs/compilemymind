<text x="306" y="128" font-family="Inter, Arial, sans-serif" font-size="21" fill="#0f172a">Application Client</text>
<line x1="600" y1="186" x2="600" y2="212" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="220" y="224" width="760" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
<circle cx="264" cy="265.0" r="22" fill="#2563eb"/>
<text x="264" y="272.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">2</text>
<text x="306" y="256" font-family="Inter, Arial, sans-serif" font-size="21" fill="#0f172a">PostgreSQL (with pgvector) - Relational Data -</text>
<text x="306" y="278" font-family="Inter, Arial, sans-serif" font-size="21" fill="#0f172a">Vector Embeddings - Single Transaction</text>
<line x1="600" y1="314" x2="600" y2="340" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="220" y="352" width="760" height="82" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<circle cx="264" cy="393.0" r="22" fill="#2563eb"/>
<text x="264" y="400.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">3</text>
<text x="306" y="384" font-family="Inter, Arial, sans-serif" font-size="21" fill="#0f172a">Primary PostgreSQL - Relational Data Only</text>
<line x1="600" y1="442" x2="600" y2="468" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="220" y="480" width="760" height="82" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
