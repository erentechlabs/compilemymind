<text x="306" y="512" font-family="Inter, Arial, sans-serif" font-size="21" fill="#0f172a">Specialized Vector DB - Embeddings Only</text>
<text x="626.0" y="188.0" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Unified Query / Write • 1. Write</text>
<text x="626.0" y="206.0" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Relational Data • 2. Write Vector</text>
<text x="626.0" y="224.0" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">(Dual-Write)</text>
