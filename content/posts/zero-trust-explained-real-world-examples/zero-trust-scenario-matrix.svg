<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Zero Trust real-world scenario matrix</title>
  <desc id="desc">A scenario matrix mapping common business situations to Zero Trust controls.</desc>
  <rect width="1040" height="620" rx="28" fill="#100719"/>
  <text x="54" y="62" fill="#f5f3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700">Real-World Zero Trust Scenarios</text>
  <text x="54" y="98" fill="#c7b8e6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">The same principles show up differently across users, devices, apps, data, and operations.</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <g fill="#211433" stroke="#392354">
      <rect x="54" y="138" width="932" height="62" rx="14"/>
      <rect x="54" y="218" width="932" height="62" rx="14"/>
      <rect x="54" y="298" width="932" height="62" rx="14"/>
      <rect x="54" y="378" width="932" height="62" rx="14"/>
      <rect x="54" y="458" width="932" height="62" rx="14"/>
    </g>
    <g fill="#f5f3ff" font-size="18" font-weight="700">
      <text x="84" y="176">Remote employee opens payroll data from home</text>
      <text x="84" y="256">Contractor needs temporary access to a project site</text>
      <text x="84" y="336">Admin must change production firewall rules</text>
      <text x="84" y="416">SaaS app requests broad mailbox permissions</text>
      <text x="84" y="496">Endpoint starts encrypting files rapidly</text>
    </g>
    <g fill="#c7b8e6" font-size="14">
      <text x="84" y="196">Verify user, device health, location, session risk, and label sensitivity</text>
      <text x="84" y="276">Use time-bound access, access reviews, least privilege, and guest governance</text>
      <text x="84" y="356">Require privileged activation, MFA, approval, audit, and just-enough rights</text>
      <text x="84" y="436">Review app consent, restrict permissions, monitor behavior, and revoke if risky</text>
      <text x="84" y="516">Detect, isolate, investigate, restore, and improve controls after the incident</text>
    </g>

    <g text-anchor="middle" font-size="14" font-weight="700">
      <rect x="728" y="153" width="218" height="32" rx="10" fill="#7c3aed"/>
      <text x="837" y="174" fill="#fff">Conditional access + DLP</text>
      <rect x="728" y="233" width="218" height="32" rx="10" fill="#a855f7"/>
      <text x="837" y="254" fill="#fff">Lifecycle governance</text>
      <rect x="728" y="313" width="218" height="32" rx="10" fill="#22d3ee"/>
      <text x="837" y="334" fill="#06121a">Privileged access</text>
      <rect x="728" y="393" width="218" height="32" rx="10" fill="#c084fc"/>
      <text x="837" y="414" fill="#160d25">App governance</text>
      <rect x="728" y="473" width="218" height="32" rx="10" fill="#8b5cf6"/>
      <text x="837" y="494" fill="#fff">Detection + response</text>
    </g>

    <text x="54" y="574" fill="#b9a8d8" font-size="15">Zero Trust does not mean blocking everything. It means granting the right level of access after the right checks.</text>
  </g>
</svg>
