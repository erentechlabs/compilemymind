<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 510" role="img" aria-labelledby="title desc">
  <title id="title">AZ-900 domain weighting ranges</title>
  <desc id="desc">A horizontal range chart showing Azure cloud concepts at 25 to 30 percent, Azure architecture and services at 35 to 40 percent, and Azure management and governance at 30 to 35 percent.</desc>
  <rect width="1000" height="510" rx="18" fill="#f8fafc"/>
  <text x="60" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">AZ-900 Domain Weighting</text>
  <text x="60" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#4b5563">Skills measured as of January 14, 2026 on Microsoft Learn.</text>

  <line x1="300" y1="165" x2="900" y2="165" stroke="#cbd5e1" stroke-width="2"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">
    <text x="294" y="148">0%</text>
    <text x="414" y="148">10%</text>
    <text x="534" y="148">20%</text>
    <text x="654" y="148">30%</text>
    <text x="774" y="148">40%</text>
    <text x="894" y="148">50%</text>
  </g>
  <g stroke="#64748b" stroke-width="2">
    <line x1="300" y1="160" x2="300" y2="170"/>
    <line x1="420" y1="160" x2="420" y2="170"/>
    <line x1="540" y1="160" x2="540" y2="170"/>
    <line x1="660" y1="160" x2="660" y2="170"/>
    <line x1="780" y1="160" x2="780" y2="170"/>
    <line x1="900" y1="160" x2="900" y2="170"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="60" y="230" font-size="20" font-weight="700" fill="#0f172a">1. Cloud concepts</text>
    <rect x="600" y="205" width="60" height="34" rx="8" fill="#2563eb"/>
    <text x="675" y="229" font-size="16" font-weight="700" fill="#2563eb">25-30%</text>

    <text x="60" y="310" font-size="20" font-weight="700" fill="#0f172a">2. Architecture and services</text>
    <rect x="720" y="285" width="60" height="34" rx="8" fill="#059669"/>
    <text x="795" y="309" font-size="16" font-weight="700" fill="#059669">35-40%</text>

    <text x="60" y="390" font-size="20" font-weight="700" fill="#0f172a">3. Management and governance</text>
    <rect x="660" y="365" width="60" height="34" rx="8" fill="#7c3aed"/>
    <text x="735" y="389" font-size="16" font-weight="700" fill="#7c3aed">30-35%</text>
  </g>

  <text x="60" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">Study priority: Azure architecture/services and governance together are roughly two-thirds of the exam.</text>
</svg>
