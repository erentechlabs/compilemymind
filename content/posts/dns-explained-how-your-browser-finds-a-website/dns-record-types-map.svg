<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">DNS record types map</title>
  <desc id="desc">A visual map of common DNS record types including A, AAAA, CNAME, MX, TXT, NS, SOA, CAA, SRV, and PTR.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="32" fill="url(#bg)"/>
  <circle cx="172" cy="96" r="118" fill="#a855f7" opacity="0.12"/>
  <circle cx="1020" cy="496" r="150" fill="#38bdf8" opacity="0.10"/>
  <path d="M80 470 C260 400 390 514 560 444 C780 354 870 236 1120 300" fill="none" stroke="#c4b5fd" stroke-opacity="0.13" stroke-width="3"/>

  <text x="600" y="58" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle">Common DNS Record Types</text>
  <text x="600" y="92" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" text-anchor="middle">Different records answer different questions about a domain.</text>

  <g filter="url(#shadow)">
    <circle cx="600" cy="310" r="92" fill="#111827" stroke="url(#node)" stroke-width="4"/>
  </g>
  <text x="600" y="298" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="900" text-anchor="middle">DNS</text>
  <text x="600" y="330" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">zone records</text>

  <g stroke="#8b5cf6" stroke-opacity="0.38" stroke-width="3">
    <line x1="530" y1="250" x2="282" y2="150"/>
    <line x1="670" y1="250" x2="918" y2="150"/>
    <line x1="508" y1="310" x2="250" y2="310"/>
    <line x1="692" y1="310" x2="950" y2="310"/>
    <line x1="532" y1="370" x2="282" y2="470"/>
    <line x1="668" y1="370" x2="918" y2="470"/>
    <line x1="600" y1="218" x2="600" y2="142"/>
    <line x1="600" y1="402" x2="600" y2="478"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(130 105)">
      <rect width="220" height="90" rx="18" fill="#111827" stroke="#c084fc" stroke-opacity="0.65"/>
      <text x="110" y="34" fill="#f8fafc" font-size="24" font-weight="900" text-anchor="middle">A</text>
      <text x="110" y="63" fill="#cbd5e1" font-size="15" text-anchor="middle">Hostname to IPv4</text>
    </g>
    <g transform="translate(850 105)">
      <rect width="220" height="90" rx="18" fill="#111827" stroke="#38bdf8" stroke-opacity="0.65"/>
      <text x="110" y="34" fill="#f8fafc" font-size="24" font-weight="900" text-anchor="middle">AAAA</text>
      <text x="110" y="63" fill="#cbd5e1" font-size="15" text-anchor="middle">Hostname to IPv6</text>
    </g>
    <g transform="translate(100 265)">
      <rect width="220" height="90" rx="18" fill="#111827" stroke="#c084fc" stroke-opacity="0.65"/>
      <text x="110" y="34" fill="#f8fafc" font-size="24" font-weight="900" text-anchor="middle">CNAME</text>
      <text x="110" y="63" fill="#cbd5e1" font-size="15" text-anchor="middle">Alias to a hostname</text>
    </g>
    <g transform="translate(880 265)">
      <rect width="220" height="90" rx="18" fill="#111827" stroke="#38bdf8" stroke-opacity="0.65"/>
      <text x="110" y="34" fill="#f8fafc" font-size="24" font-weight="900" text-anchor="middle">MX</text>
      <text x="110" y="63" fill="#cbd5e1" font-size="15" text-anchor="middle">Mail delivery</text>
    </g>
    <g transform="translate(130 425)">
      <rect width="220" height="90" rx="18" fill="#111827" stroke="#c084fc" stroke-opacity="0.65"/>
      <text x="110" y="34" fill="#f8fafc" font-size="24" font-weight="900" text-anchor="middle">TXT</text>
      <text x="110" y="63" fill="#cbd5e1" font-size="15" text-anchor="middle">Verification and email</text>
    </g>
    <g transform="translate(850 425)">
      <rect width="220" height="90" rx="18" fill="#111827" stroke="#38bdf8" stroke-opacity="0.65"/>
      <text x="110" y="34" fill="#f8fafc" font-size="24" font-weight="900" text-anchor="middle">NS</text>
      <text x="110" y="63" fill="#cbd5e1" font-size="15" text-anchor="middle">Nameserver delegation</text>
    </g>
    <g transform="translate(490 95)">
      <rect width="220" height="82" rx="18" fill="#111827" stroke="#a78bfa" stroke-opacity="0.6"/>
      <text x="110" y="32" fill="#f8fafc" font-size="23" font-weight="900" text-anchor="middle">SOA</text>
      <text x="110" y="58" fill="#cbd5e1" font-size="15" text-anchor="middle">Zone metadata</text>
    </g>
    <g transform="translate(490 443)">
      <rect width="220" height="82" rx="18" fill="#111827" stroke="#a78bfa" stroke-opacity="0.6"/>
      <text x="110" y="32" fill="#f8fafc" font-size="23" font-weight="900" text-anchor="middle">CAA / SRV / PTR</text>
      <text x="110" y="58" fill="#cbd5e1" font-size="15" text-anchor="middle">Certificates, services, reverse DNS</text>
    </g>
  </g>

  <rect x="250" y="548" width="700" height="44" rx="15" fill="#020617" opacity="0.36" stroke="#a855f7" stroke-opacity="0.24"/>
  <text x="600" y="576" fill="#e0e7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">A website lookup usually starts with A, AAAA, or CNAME records, but DNS supports much more.</text>
</svg>
