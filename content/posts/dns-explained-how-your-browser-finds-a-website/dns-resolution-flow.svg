<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">DNS resolution flow</title>
  <desc id="desc">A browser asks a recursive resolver, which follows referrals from root, TLD, and authoritative DNS servers before returning an IP address.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#c4b5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="520" rx="32" fill="url(#bg)"/>
  <path d="M0 430 C210 360 330 455 520 390 C740 312 820 192 1200 250 L1200 520 L0 520 Z" fill="#38bdf8" opacity="0.08"/>
  <path d="M0 130 C175 80 320 160 475 116 C710 48 850 68 1200 112" fill="none" stroke="#a855f7" stroke-opacity="0.15" stroke-width="2"/>

  <text x="600" y="58" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle">How DNS Finds a Website</text>
  <text x="600" y="92" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" text-anchor="middle">The browser asks for a name. DNS returns an address.</text>

  <g filter="url(#shadow)">
    <rect x="55" y="165" width="170" height="112" rx="22" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.55"/>
    <rect x="278" y="165" width="196" height="112" rx="22" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.55"/>
    <rect x="545" y="145" width="150" height="92" rx="22" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.5"/>
    <rect x="545" y="280" width="150" height="92" rx="22" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.5"/>
    <rect x="770" y="145" width="150" height="92" rx="22" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.5"/>
    <rect x="770" y="280" width="150" height="92" rx="22" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.5"/>
    <rect x="990" y="190" width="155" height="112" rx="22" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.55"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="140" y="208" fill="#f8fafc" font-size="22" font-weight="800">Browser</text>
    <text x="140" y="238" fill="#cbd5e1" font-size="15">Needs an IP</text>

    <text x="376" y="204" fill="#f8fafc" font-size="22" font-weight="800">Recursive</text>
    <text x="376" y="232" fill="#f8fafc" font-size="22" font-weight="800">Resolver</text>
    <text x="376" y="260" fill="#cbd5e1" font-size="15">Finds the answer</text>

    <text x="620" y="184" fill="#f8fafc" font-size="21" font-weight="800">Root</text>
    <text x="620" y="212" fill="#cbd5e1" font-size="15">Where is .com?</text>

    <text x="620" y="319" fill="#f8fafc" font-size="21" font-weight="800">TLD</text>
    <text x="620" y="347" fill="#cbd5e1" font-size="15">Where is domain?</text>

    <text x="845" y="184" fill="#f8fafc" font-size="21" font-weight="800">Authoritative</text>
    <text x="845" y="212" fill="#cbd5e1" font-size="15">Has records</text>

    <text x="845" y="319" fill="#f8fafc" font-size="21" font-weight="800">Answer</text>
    <text x="845" y="347" fill="#cbd5e1" font-size="15">A / AAAA / CNAME</text>

    <text x="1068" y="230" fill="#f8fafc" font-size="22" font-weight="800">IP Address</text>
    <text x="1068" y="260" fill="#cbd5e1" font-size="15">Connect to site</text>
  </g>

  <g fill="none" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M226 220 H270"/>
    <path d="M475 198 C510 160 520 160 542 182"/>
    <path d="M620 238 V278"/>
    <path d="M695 326 H764"/>
    <path d="M845 238 V278"/>
    <path d="M920 326 C952 320 965 290 986 260"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#ddd6fe">
    <text x="248" y="205" text-anchor="middle">query</text>
    <text x="512" y="145" text-anchor="middle">referral</text>
    <text x="642" y="262" text-anchor="start">referral</text>
    <text x="730" y="309" text-anchor="middle">ask</text>
    <text x="870" y="262" text-anchor="start">record</text>
    <text x="956" y="304" text-anchor="middle">return</text>
  </g>

  <rect x="272" y="408" width="656" height="54" rx="18" fill="#020617" opacity="0.38" stroke="#a855f7" stroke-opacity="0.25"/>
  <text x="600" y="441" fill="#e0e7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">DNS does not fetch the page. It tells the browser where to connect.</text>
</svg>
