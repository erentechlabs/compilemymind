<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Zero Trust and defense in depth model</title>
  <desc id="desc">A diagram connecting Zero Trust principles to defense-in-depth layers and Microsoft identity controls.</desc>
  <rect width="960" height="560" rx="24" fill="#100719"/>
  <text x="48" y="58" fill="#f5f3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700">Zero Trust + Defense in Depth</text>
  <text x="48" y="92" fill="#b9a8d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">SC-900 mental model: verify every request, reduce privileges, and assume controls can fail</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <g transform="translate(64 142)">
      <rect width="248" height="98" rx="16" fill="#211433" stroke="#7c3aed"/>
      <text x="24" y="36" fill="#f5f3ff" font-size="19" font-weight="700">Verify explicitly</text>
      <text x="24" y="64" fill="#c7b8e6" font-size="14">Use identity, device,</text>
      <text x="24" y="84" fill="#c7b8e6" font-size="14">location, risk, and app signals</text>
    </g>
    <g transform="translate(356 142)">
      <rect width="248" height="98" rx="16" fill="#211433" stroke="#a855f7"/>
      <text x="24" y="36" fill="#f5f3ff" font-size="19" font-weight="700">Least privilege</text>
      <text x="24" y="64" fill="#c7b8e6" font-size="14">Grant just enough access</text>
      <text x="24" y="84" fill="#c7b8e6" font-size="14">for just enough time</text>
    </g>
    <g transform="translate(648 142)">
      <rect width="248" height="98" rx="16" fill="#211433" stroke="#22d3ee"/>
      <text x="24" y="36" fill="#f5f3ff" font-size="19" font-weight="700">Assume breach</text>
      <text x="24" y="64" fill="#c7b8e6" font-size="14">Segment access, monitor,</text>
      <text x="24" y="84" fill="#c7b8e6" font-size="14">detect, and respond quickly</text>
    </g>

    <path d="M188 252v52M480 252v52M772 252v52" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
    <path d="M188 304h584" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>

    <g transform="translate(112 330)">
      <rect width="736" height="144" rx="20" fill="#160d25" stroke="#382454"/>
      <text x="32" y="42" fill="#f5f3ff" font-size="20" font-weight="700">Defense-in-depth layers</text>
      <g fill="#c7b8e6" font-size="15">
        <text x="32" y="78">Physical security</text>
        <text x="178" y="78">Network controls</text>
        <text x="332" y="78">Endpoint protection</text>
        <text x="510" y="78">Application controls</text>
        <text x="32" y="116">Identity and access</text>
        <text x="178" y="116">Data protection</text>
        <text x="332" y="116">Monitoring and response</text>
        <text x="558" y="116">Governance</text>
      </g>
      <g fill="#9b5de5">
        <circle cx="22" cy="73" r="6"/>
        <circle cx="168" cy="73" r="6"/>
        <circle cx="322" cy="73" r="6"/>
        <circle cx="500" cy="73" r="6"/>
        <circle cx="22" cy="111" r="6"/>
        <circle cx="168" cy="111" r="6"/>
        <circle cx="322" cy="111" r="6"/>
        <circle cx="548" cy="111" r="6"/>
      </g>
    </g>

    <text x="160" y="516" fill="#b9a8d8" font-size="15">Exam cue: Zero Trust is a strategy. Defense in depth is layered control design. Entra, Defender, Sentinel, and Purview implement pieces of both.</text>
  </g>
</svg>
