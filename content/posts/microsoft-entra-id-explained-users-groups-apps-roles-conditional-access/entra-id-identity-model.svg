<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Microsoft Entra ID identity model</title>
  <desc id="desc">A diagram showing Microsoft Entra ID as an identity control plane connecting users, groups, apps, roles, Conditional Access, logs, and resources.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#c4b5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="640" rx="34" fill="url(#bg)"/>
  <circle cx="120" cy="110" r="125" fill="#a855f7" opacity="0.12"/>
  <circle cx="1080" cy="510" r="150" fill="#38bdf8" opacity="0.10"/>
  <path d="M80 510 C270 430 420 552 610 462 C820 362 910 238 1120 305" fill="none" stroke="#a78bfa" stroke-opacity="0.16" stroke-width="3"/>

  <text x="600" y="60" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="850" text-anchor="middle">Microsoft Entra ID Identity Control Plane</text>
  <text x="600" y="94" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" text-anchor="middle">Users, groups, apps, roles, and access policies meet in one directory.</text>

  <g filter="url(#shadow)">
    <rect x="415" y="180" width="370" height="220" rx="30" fill="#111827" stroke="url(#accent)" stroke-width="4"/>
    <rect x="65" y="170" width="210" height="98" rx="22" fill="url(#panel)" stroke="#c084fc" stroke-opacity="0.55"/>
    <rect x="65" y="342" width="210" height="98" rx="22" fill="url(#panel)" stroke="#c084fc" stroke-opacity="0.55"/>
    <rect x="925" y="170" width="210" height="98" rx="22" fill="url(#panel)" stroke="#38bdf8" stroke-opacity="0.55"/>
    <rect x="925" y="342" width="210" height="98" rx="22" fill="url(#panel)" stroke="#38bdf8" stroke-opacity="0.55"/>
    <rect x="330" y="485" width="230" height="86" rx="22" fill="url(#panel)" stroke="#a78bfa" stroke-opacity="0.55"/>
    <rect x="640" y="485" width="230" height="86" rx="22" fill="url(#panel)" stroke="#a78bfa" stroke-opacity="0.55"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="235" fill="#f8fafc" font-size="30" font-weight="900">Microsoft Entra ID</text>
    <text x="600" y="272" fill="#cbd5e1" font-size="17">Tenant directory</text>
    <text x="600" y="304" fill="#e0e7ff" font-size="16">Authentication, authorization, policy, and logs</text>
    <rect x="485" y="332" width="230" height="38" rx="14" fill="#020617" opacity="0.55"/>
    <text x="600" y="357" fill="#ddd6fe" font-size="15" font-weight="800">Identity decisions happen here</text>

    <text x="170" y="208" fill="#f8fafc" font-size="23" font-weight="850">Users</text>
    <text x="170" y="237" fill="#cbd5e1" font-size="15">Members and guests</text>

    <text x="170" y="380" fill="#f8fafc" font-size="23" font-weight="850">Groups</text>
    <text x="170" y="409" fill="#cbd5e1" font-size="15">Access at scale</text>

    <text x="1030" y="208" fill="#f8fafc" font-size="23" font-weight="850">Apps</text>
    <text x="1030" y="237" fill="#cbd5e1" font-size="15">Enterprise apps and APIs</text>

    <text x="1030" y="380" fill="#f8fafc" font-size="23" font-weight="850">Roles</text>
    <text x="1030" y="409" fill="#cbd5e1" font-size="15">Admin permissions</text>

    <text x="445" y="520" fill="#f8fafc" font-size="22" font-weight="850">Conditional Access</text>
    <text x="445" y="548" fill="#cbd5e1" font-size="15">If-then policy decisions</text>

    <text x="755" y="520" fill="#f8fafc" font-size="22" font-weight="850">Logs and Risk</text>
    <text x="755" y="548" fill="#cbd5e1" font-size="15">Audit, sign-ins, detections</text>
  </g>

  <g fill="none" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M276 220 H407"/>
    <path d="M276 390 H407"/>
    <path d="M924 220 H793"/>
    <path d="M924 390 H793"/>
    <path d="M505 485 L545 405"/>
    <path d="M705 485 L660 405"/>
  </g>
</svg>
