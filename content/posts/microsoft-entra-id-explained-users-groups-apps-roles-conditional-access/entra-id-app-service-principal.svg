<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Application objects and service principals</title>
  <desc id="desc">A diagram showing one application object in a home tenant creating service principal instances in consuming tenants.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="56%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#c4b5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="34" fill="url(#bg)"/>
  <text x="600" y="58" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="33" font-weight="850" text-anchor="middle">App Registration vs. Service Principal</text>
  <text x="600" y="92" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" text-anchor="middle">The app object is the blueprint. Service principals are tenant-local instances.</text>

  <g filter="url(#shadow)">
    <rect x="55" y="150" width="315" height="290" rx="28" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.65"/>
    <rect x="442" y="150" width="315" height="290" rx="28" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.55"/>
    <rect x="830" y="150" width="315" height="290" rx="28" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.55"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="212" y="195" fill="#f8fafc" font-size="25" font-weight="900" text-anchor="middle">Home Tenant</text>
    <text x="212" y="225" fill="#cbd5e1" font-size="16" text-anchor="middle">Where the app is registered</text>
    <rect x="95" y="260" width="235" height="95" rx="20" fill="#020617" opacity="0.48" stroke="#c084fc" stroke-opacity="0.45"/>
    <text x="212" y="296" fill="#f8fafc" font-size="21" font-weight="850" text-anchor="middle">Application Object</text>
    <text x="212" y="325" fill="#cbd5e1" font-size="15" text-anchor="middle">Client ID, redirect URIs,</text>
    <text x="212" y="348" fill="#cbd5e1" font-size="15" text-anchor="middle">permissions, app settings</text>

    <text x="600" y="195" fill="#f8fafc" font-size="25" font-weight="900" text-anchor="middle">Tenant A</text>
    <text x="600" y="225" fill="#cbd5e1" font-size="16" text-anchor="middle">Local enterprise app instance</text>
    <rect x="482" y="260" width="235" height="95" rx="20" fill="#020617" opacity="0.48" stroke="#38bdf8" stroke-opacity="0.45"/>
    <text x="600" y="296" fill="#f8fafc" font-size="21" font-weight="850" text-anchor="middle">Service Principal</text>
    <text x="600" y="325" fill="#cbd5e1" font-size="15" text-anchor="middle">Users, assignments,</text>
    <text x="600" y="348" fill="#cbd5e1" font-size="15" text-anchor="middle">permissions, sign-ins</text>

    <text x="988" y="195" fill="#f8fafc" font-size="25" font-weight="900" text-anchor="middle">Tenant B</text>
    <text x="988" y="225" fill="#cbd5e1" font-size="16" text-anchor="middle">Another local instance</text>
    <rect x="870" y="260" width="235" height="95" rx="20" fill="#020617" opacity="0.48" stroke="#38bdf8" stroke-opacity="0.45"/>
    <text x="988" y="296" fill="#f8fafc" font-size="21" font-weight="850" text-anchor="middle">Service Principal</text>
    <text x="988" y="325" fill="#cbd5e1" font-size="15" text-anchor="middle">Separate tenant controls</text>
    <text x="988" y="348" fill="#cbd5e1" font-size="15" text-anchor="middle">and consent state</text>
  </g>

  <g fill="none" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M370 307 H435"/>
    <path d="M757 307 H823"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#ddd6fe" text-anchor="middle">
    <text x="405" y="285">consent</text>
    <text x="790" y="285">another tenant</text>
  </g>

  <rect x="285" y="472" width="630" height="44" rx="16" fill="#020617" opacity="0.40" stroke="#a855f7" stroke-opacity="0.25"/>
  <text x="600" y="500" fill="#e0e7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="750" text-anchor="middle">App registrations define the app. Enterprise applications control the app inside each tenant.</text>
</svg>
