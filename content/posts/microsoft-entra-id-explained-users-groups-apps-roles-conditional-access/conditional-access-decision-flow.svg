<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Conditional Access decision flow</title>
  <desc id="desc">A Conditional Access flow showing sign-in, signals, policy evaluation, and access decisions such as allow, require MFA, require compliant device, or block.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#c4b5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <path d="M0 500 C190 420 340 530 520 460 C780 360 860 220 1200 295 L1200 620 L0 620 Z" fill="#38bdf8" opacity="0.08"/>
  <text x="600" y="58" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="850" text-anchor="middle">Conditional Access Decision Flow</text>
  <text x="600" y="92" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" text-anchor="middle">If a sign-in matches policy conditions, Entra ID enforces the required controls.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="230" width="185" height="100" rx="22" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.58"/>
    <rect x="315" y="170" width="220" height="220" rx="28" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.52"/>
    <rect x="610" y="230" width="210" height="100" rx="22" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.58"/>
    <rect x="905" y="110" width="220" height="72" rx="18" fill="url(#card)" stroke="#22c55e" stroke-opacity="0.55"/>
    <rect x="905" y="222" width="220" height="72" rx="18" fill="url(#card)" stroke="#f59e0b" stroke-opacity="0.55"/>
    <rect x="905" y="334" width="220" height="72" rx="18" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.55"/>
    <rect x="905" y="446" width="220" height="72" rx="18" fill="url(#card)" stroke="#ef4444" stroke-opacity="0.55"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="152" y="270" fill="#f8fafc" font-size="22" font-weight="850">Sign-in</text>
    <text x="152" y="299" fill="#cbd5e1" font-size="15">User + app request</text>

    <text x="425" y="212" fill="#f8fafc" font-size="23" font-weight="850">Signals</text>
    <text x="425" y="248" fill="#cbd5e1" font-size="15">User or group</text>
    <text x="425" y="275" fill="#cbd5e1" font-size="15">App</text>
    <text x="425" y="302" fill="#cbd5e1" font-size="15">Location</text>
    <text x="425" y="329" fill="#cbd5e1" font-size="15">Device</text>
    <text x="425" y="356" fill="#cbd5e1" font-size="15">Risk</text>

    <text x="715" y="270" fill="#f8fafc" font-size="22" font-weight="850">Policy</text>
    <text x="715" y="299" fill="#cbd5e1" font-size="15">Evaluate if-then rules</text>

    <text x="1015" y="154" fill="#f8fafc" font-size="20" font-weight="850">Allow</text>
    <text x="1015" y="266" fill="#f8fafc" font-size="20" font-weight="850">Require MFA</text>
    <text x="1015" y="378" fill="#f8fafc" font-size="20" font-weight="850">Require Device</text>
    <text x="1015" y="490" fill="#f8fafc" font-size="20" font-weight="850">Block</text>
  </g>

  <g fill="none" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M245 280 H307"/>
    <path d="M535 280 H603"/>
    <path d="M820 280 C860 250 875 150 898 146"/>
    <path d="M820 280 H898"/>
    <path d="M820 280 C860 310 875 366 898 370"/>
    <path d="M820 280 C860 350 875 478 898 482"/>
  </g>

  <rect x="280" y="535" width="640" height="44" rx="16" fill="#020617" opacity="0.42" stroke="#a855f7" stroke-opacity="0.25"/>
  <text x="600" y="563" fill="#e0e7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="750" text-anchor="middle">Conditional Access is evaluated after first-factor authentication, then applies the right control.</text>
</svg>
