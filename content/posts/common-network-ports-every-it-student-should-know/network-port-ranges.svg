<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Network port ranges</title>
  <desc id="desc">A diagram showing System ports from 0 to 1023, User ports from 1024 to 49151, and Dynamic or Private ports from 49152 to 65535.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="52%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="58%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="145" cy="92" r="126" fill="#a855f7" opacity="0.12"/>
  <circle cx="1040" cy="430" r="152" fill="#38bdf8" opacity="0.10"/>
  <path d="M80 410 C260 330 410 450 590 374 C790 290 920 208 1120 260" fill="none" stroke="#a78bfa" stroke-opacity="0.16" stroke-width="3"/>

  <text x="600" y="62" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="850" text-anchor="middle">Port Number Ranges</text>
  <text x="600" y="98" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" text-anchor="middle">Ports are 16-bit numbers from 0 to 65535.</text>

  <g filter="url(#shadow)">
    <rect x="86" y="190" width="1028" height="92" rx="28" fill="#111827" stroke="#c4b5fd" stroke-opacity="0.28"/>
    <rect x="106" y="210" width="250" height="52" rx="18" fill="#a855f7"/>
    <rect x="368" y="210" width="470" height="52" rx="18" fill="#8b5cf6"/>
    <rect x="850" y="210" width="244" height="52" rx="18" fill="#38bdf8"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="231" y="244" fill="#ffffff" font-size="20" font-weight="850">0 - 1023</text>
    <text x="603" y="244" fill="#ffffff" font-size="20" font-weight="850">1024 - 49151</text>
    <text x="972" y="244" fill="#082f49" font-size="20" font-weight="900">49152 - 65535</text>

    <text x="231" y="324" fill="#f8fafc" font-size="24" font-weight="850">System Ports</text>
    <text x="231" y="354" fill="#cbd5e1" font-size="15">Well-known services</text>
    <text x="231" y="379" fill="#ddd6fe" font-size="15">HTTP, DNS, SSH, SMTP</text>

    <text x="603" y="324" fill="#f8fafc" font-size="24" font-weight="850">User Ports</text>
    <text x="603" y="354" fill="#cbd5e1" font-size="15">Registered applications</text>
    <text x="603" y="379" fill="#ddd6fe" font-size="15">Databases, tools, app servers</text>

    <text x="972" y="324" fill="#f8fafc" font-size="24" font-weight="850">Dynamic / Private</text>
    <text x="972" y="354" fill="#cbd5e1" font-size="15">Temporary client source ports</text>
    <text x="972" y="379" fill="#ddd6fe" font-size="15">Ephemeral connections</text>
  </g>

  <rect x="280" y="440" width="640" height="44" rx="16" fill="#020617" opacity="0.42" stroke="#a855f7" stroke-opacity="0.26"/>
  <text x="600" y="468" fill="#e0e7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="750" text-anchor="middle">The server usually listens on a known port; the client often uses a temporary high port.</text>
</svg>
