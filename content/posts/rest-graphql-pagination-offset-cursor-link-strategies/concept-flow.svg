<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1032" viewBox="0 0 1400 1032" role="img" aria-labelledby="title desc" data-text-collision-check="strict">
<defs>
<linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f5f3ff"/><stop offset="1" stop-color="#fdf2f8"/></linearGradient>
<linearGradient id="accent" x1="0" x2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#db2777"/></linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/></filter>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill="#94a3b8" opacity="0.20"/></pattern>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 z" fill="#7c3aed"/></marker>
</defs>
<rect width="1400" height="1032" rx="32" fill="url(#bg)"/>
<rect width="1400" height="1032" rx="32" fill="url(#dots)"/>
<rect x="0" y="0" width="12" height="100%" rx="6" fill="url(#accent)"/>
<title id="title">Offset positions versus stable cursor boundaries</title>
<desc id="desc">A detailed comparison diagram explaining Offset positions versus stable cursor boundaries.</desc>
<rect x="1190" y="34" width="150" height="34" rx="17" fill="#ede9fe"/>
<text x="1265" y="56" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#7c3aed">COMPARISON</text>
<text x="72" y="64" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="750" fill="#0f172a">Offset positions versus stable cursor boundaries</text>
<text x="72" y="106" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#475569">The continuation contract determines how inserts, filters, ordering, retries, and discoverable navigation</text>
<text x="72" y="129" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#475569">behave.</text>
<line x1="72" y1="148" x2="1328" y2="148" stroke="#7c3aed" stroke-opacity="0.18" stroke-width="2"/>
<rect x="70" y="186" width="595" height="714" rx="28" fill="#ffffff" fill-opacity="0.72" stroke="#cbd5e1" stroke-width="1.5"/>
<rect x="70" y="186" width="595" height="58" rx="28" fill="#ede9fe"/>
<text x="100" y="223" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#7c3aed">Offset / limit</text>
<rect x="88" y="260" width="559" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="88" y="260" width="8" height="190" rx="4" fill="url(#accent)"/>
<circle cx="122" cy="294" r="18" fill="#ede9fe"/>
<text x="122" y="300" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#7c3aed">1</text>
<text x="152" y="299" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750" letter-spacing="1.2" fill="#7c3aed">REQUEST</text>
<text x="112" y="338" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Continue by row position</text>
<text x="112" y="377" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">The client sends an offset and limit, which makes numbered-</text>
<text x="112" y="397" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">page access straightforward.</text>
<rect x="88" y="474" width="559" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="88" y="474" width="8" height="190" rx="4" fill="url(#accent)"/>
<circle cx="122" cy="508" r="18" fill="#ede9fe"/>
<text x="122" y="514" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#7c3aed">2</text>
<text x="152" y="513" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750" letter-spacing="1.2" fill="#7c3aed">NAVIGATION</text>
<text x="112" y="552" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Support direct page jumps</text>
<text x="112" y="591" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">A client can request page 20 directly, but the position has</text>
<text x="112" y="611" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">meaning only for the current ordering.</text>
<rect x="88" y="688" width="559" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="88" y="688" width="8" height="190" rx="4" fill="url(#accent)"/>
<circle cx="122" cy="722" r="18" fill="#ede9fe"/>
<text x="122" y="728" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#7c3aed">3</text>
<text x="152" y="727" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750" letter-spacing="1.2" fill="#7c3aed">RISK</text>
<text x="112" y="766" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Earlier writes shift later pages</text>
<text x="112" y="805" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">Inserts or deletes before the offset can duplicate or skip</text>
<text x="112" y="825" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">records during traversal.</text>
<rect x="735" y="186" width="595" height="714" rx="28" fill="#ffffff" fill-opacity="0.72" stroke="#cbd5e1" stroke-width="1.5"/>
<rect x="735" y="186" width="595" height="58" rx="28" fill="#ede9fe"/>
<text x="765" y="223" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#7c3aed">Cursor / links</text>
<rect x="753" y="260" width="559" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="753" y="260" width="8" height="190" rx="4" fill="url(#accent)"/>
<circle cx="787" cy="294" r="18" fill="#ede9fe"/>
<text x="787" y="300" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#7c3aed">1</text>
<text x="817" y="299" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750" letter-spacing="1.2" fill="#7c3aed">BOUNDARY</text>
<text x="777" y="338" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Continue after a stable key</text>
<text x="777" y="377" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">A timestamp plus unique ID defines the exact ordered boundary</text>
<text x="777" y="397" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">already observed.</text>
<rect x="753" y="474" width="559" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="753" y="474" width="8" height="190" rx="4" fill="url(#accent)"/>
<circle cx="787" cy="508" r="18" fill="#ede9fe"/>
<text x="787" y="514" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#7c3aed">2</text>
<text x="817" y="513" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750" letter-spacing="1.2" fill="#7c3aed">CONTRACT</text>
<text x="777" y="552" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Bind token to query context</text>
<text x="777" y="591" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">The opaque token carries filter, sort, direction,</text>
<text x="777" y="611" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">authorization scope, and expiry.</text>
<rect x="753" y="688" width="559" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="753" y="688" width="8" height="190" rx="4" fill="url(#accent)"/>
<circle cx="787" cy="722" r="18" fill="#ede9fe"/>
<text x="787" y="728" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#7c3aed">3</text>
<text x="817" y="727" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750" letter-spacing="1.2" fill="#7c3aed">OUTPUT</text>
<text x="777" y="766" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Publish the next request</text>
<text x="777" y="805" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">REST Link relations or GraphQL pageInfo let clients follow</text>
<text x="777" y="825" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#475569">server-defined navigation.</text>
<circle cx="700" cy="215" r="26" fill="url(#accent)" stroke="#ffffff" stroke-width="4"/>
<text x="700" y="221" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#ffffff">VS</text>
<text x="72" y="994" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="1" fill="#7c3aed">TAKEAWAY</text>
<text x="175" y="994" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#334155">Choose the boundary from mutation behavior and navigation needs, then make ordering and termination explicit.</text>
</svg>