<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">TCP and UDP transport layer map</title>
  <desc id="desc">Diagram showing applications using TCP or UDP above IP and link layer networking.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13051f"/>
      <stop offset="0.55" stop-color="#201035"/>
      <stop offset="1" stop-color="#0b1324"/>
    </linearGradient>
    <linearGradient id="tcp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="udp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#8b5cf6" stroke-width="1">
    <path d="M80 90H1120M80 170H1120M80 250H1120M80 330H1120M80 410H1120M80 490H1120"/>
    <path d="M160 60V560M320 60V560M480 60V560M640 60V560M800 60V560M960 60V560"/>
  </g>

  <text x="600" y="68" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Where TCP and UDP Fit</text>
  <text x="600" y="105" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Applications choose a transport protocol before IP carries packets across the network.</text>

  <g filter="url(#shadow)">
    <rect x="110" y="145" width="980" height="82" rx="16" fill="#180c2b" stroke="#7c3aed" stroke-opacity="0.45"/>
    <text x="145" y="178" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Application Layer</text>
    <text x="145" y="205" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">HTTPS, SSH, DNS, games, voice, video, APIs, file transfer</text>

    <rect x="110" y="265" width="450" height="120" rx="18" fill="url(#tcp)" opacity="0.95"/>
    <text x="335" y="305" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900">TCP</text>
    <text x="335" y="336" text-anchor="middle" fill="#eef2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Reliable, ordered, connection-oriented</text>
    <text x="335" y="363" text-anchor="middle" fill="#eef2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Examples: HTTPS, SSH, email, file transfer</text>

    <rect x="640" y="265" width="450" height="120" rx="18" fill="url(#udp)" opacity="0.95"/>
    <text x="865" y="305" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900">UDP</text>
    <text x="865" y="336" text-anchor="middle" fill="#fff7ed" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Lightweight, low-overhead, connectionless</text>
    <text x="865" y="363" text-anchor="middle" fill="#fff7ed" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Examples: DNS, VoIP, gaming, QUIC</text>

    <rect x="110" y="425" width="980" height="72" rx="16" fill="#0f1b33" stroke="#38bdf8" stroke-opacity="0.38"/>
    <text x="145" y="456" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Network Layer: IP</text>
    <text x="145" y="481" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Gets packets from source IP to destination IP through routers.</text>

    <rect x="110" y="525" width="980" height="56" rx="16" fill="#111827" stroke="#94a3b8" stroke-opacity="0.25"/>
    <text x="145" y="560" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Link Layer</text>
    <text x="282" y="560" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Ethernet, Wi-Fi, MAC addresses, local delivery</text>
  </g>

  <g fill="none" stroke="#e9d5ff" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <path d="M335 227V258"/>
    <path d="M865 227V258"/>
    <path d="M335 385V420"/>
    <path d="M865 385V420"/>
    <path d="M600 497V520"/>
  </g>
</svg>
