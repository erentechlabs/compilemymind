<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">JPA Hibernate JDBC stack</title>
  <desc id="desc">A layered diagram showing Spring Data JPA, JPA, Hibernate, JDBC, the database driver, and the database.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="52%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#c4b5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <circle cx="150" cy="110" r="130" fill="#a855f7" opacity="0.12"/>
  <circle cx="1050" cy="520" r="160" fill="#38bdf8" opacity="0.10"/>
  <path d="M80 500 C260 420 410 532 610 448 C815 362 920 236 1120 304" fill="none" stroke="#a78bfa" stroke-opacity="0.16" stroke-width="3"/>

  <text x="600" y="58" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="850" text-anchor="middle">Java Persistence Stack</text>
  <text x="600" y="92" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" text-anchor="middle">Higher layers reduce boilerplate, lower layers provide direct control.</text>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="290" y="132" width="620" height="64" rx="20" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.55"/>
    <rect x="330" y="216" width="540" height="64" rx="20" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.55"/>
    <rect x="370" y="300" width="460" height="64" rx="20" fill="url(#card)" stroke="#c084fc" stroke-opacity="0.55"/>
    <rect x="410" y="384" width="380" height="64" rx="20" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.55"/>
    <rect x="450" y="468" width="300" height="64" rx="20" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.55"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="172" fill="#f8fafc" font-size="22" font-weight="850">Spring Data JPA</text>
    <text x="600" y="256" fill="#f8fafc" font-size="22" font-weight="850">JPA / Jakarta Persistence API</text>
    <text x="600" y="340" fill="#f8fafc" font-size="22" font-weight="850">Hibernate ORM</text>
    <text x="600" y="424" fill="#f8fafc" font-size="22" font-weight="850">JDBC</text>
    <text x="600" y="508" fill="#f8fafc" font-size="22" font-weight="850">Database Driver and Database</text>

    <text x="130" y="168" fill="#cbd5e1" font-size="16" text-anchor="start">Repository convenience</text>
    <text x="130" y="252" fill="#cbd5e1" font-size="16" text-anchor="start">Standard ORM contract</text>
    <text x="130" y="336" fill="#cbd5e1" font-size="16" text-anchor="start">Concrete ORM engine</text>
    <text x="130" y="420" fill="#cbd5e1" font-size="16" text-anchor="start">SQL access API</text>
    <text x="130" y="504" fill="#cbd5e1" font-size="16" text-anchor="start">Actual storage layer</text>

    <text x="950" y="168" fill="#ddd6fe" font-size="16" text-anchor="start">findByEmail()</text>
    <text x="950" y="252" fill="#ddd6fe" font-size="16" text-anchor="start">@Entity, EntityManager</text>
    <text x="950" y="336" fill="#ddd6fe" font-size="16" text-anchor="start">SQL generation, dirty checking</text>
    <text x="950" y="420" fill="#ddd6fe" font-size="16" text-anchor="start">Connection, PreparedStatement</text>
    <text x="950" y="504" fill="#ddd6fe" font-size="16" text-anchor="start">PostgreSQL, MySQL, Oracle...</text>
  </g>

  <g fill="none" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M600 196 V214"/>
    <path d="M600 280 V298"/>
    <path d="M600 364 V382"/>
    <path d="M600 448 V466"/>
  </g>

  <rect x="276" y="558" width="648" height="42" rx="16" fill="#020617" opacity="0.42" stroke="#a855f7" stroke-opacity="0.25"/>
  <text x="600" y="585" fill="#e0e7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="750" text-anchor="middle">Even when you use JPA or Hibernate, SQL eventually reaches the database through JDBC.</text>
</svg>
