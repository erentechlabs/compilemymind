<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">CompTIA troubleshooting methodology flow</title>
  <desc id="desc">A six-step troubleshooting flow: identify the problem, establish a theory, test the theory, plan and implement the fix, verify functionality, and document findings.</desc>
  <rect width="1100" height="360" rx="18" fill="#f8fafc"/>
  <text x="60" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#111827">Troubleshooting Methodology</text>
  <text x="60" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4b5563">A professional technician follows evidence, not hunches.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <style>
      .step{font-family:Segoe UI,Arial,sans-serif;font-size:15px;font-weight:700;fill:#0f172a}
      .num{font-family:Segoe UI,Arial,sans-serif;font-size:18px;font-weight:800;fill:#ffffff}
    </style>
  </defs>

  <g transform="translate(55 155)">
    <g>
      <rect width="140" height="84" rx="12" fill="#dbeafe" stroke="#93c5fd"/>
      <circle cx="25" cy="24" r="15" fill="#2563eb"/><text class="num" x="25" y="30" text-anchor="middle">1</text>
      <text class="step" x="70" y="39" text-anchor="middle">Identify</text>
      <text class="step" x="70" y="61" text-anchor="middle">problem</text>
    </g>
    <path d="M150 42h38" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(195 0)">
      <rect width="140" height="84" rx="12" fill="#dcfce7" stroke="#86efac"/>
      <circle cx="25" cy="24" r="15" fill="#059669"/><text class="num" x="25" y="30" text-anchor="middle">2</text>
      <text class="step" x="70" y="39" text-anchor="middle">Form</text>
      <text class="step" x="70" y="61" text-anchor="middle">theory</text>
    </g>
    <path d="M345 42h38" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(390 0)">
      <rect width="140" height="84" rx="12" fill="#fef3c7" stroke="#fcd34d"/>
      <circle cx="25" cy="24" r="15" fill="#f59e0b"/><text class="num" x="25" y="30" text-anchor="middle">3</text>
      <text class="step" x="70" y="39" text-anchor="middle">Test</text>
      <text class="step" x="70" y="61" text-anchor="middle">theory</text>
    </g>
    <path d="M540 42h38" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(585 0)">
      <rect width="140" height="84" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
      <circle cx="25" cy="24" r="15" fill="#7c3aed"/><text class="num" x="25" y="30" text-anchor="middle">4</text>
      <text class="step" x="70" y="39" text-anchor="middle">Plan and</text>
      <text class="step" x="70" y="61" text-anchor="middle">implement</text>
    </g>
    <path d="M735 42h38" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(780 0)">
      <rect width="140" height="84" rx="12" fill="#e0f2fe" stroke="#7dd3fc"/>
      <circle cx="25" cy="24" r="15" fill="#0ea5e9"/><text class="num" x="25" y="30" text-anchor="middle">5</text>
      <text class="step" x="70" y="39" text-anchor="middle">Verify</text>
      <text class="step" x="70" y="61" text-anchor="middle">function</text>
    </g>
    <path d="M930 42h38" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(975 0)">
      <rect width="70" height="84" rx="12" fill="#fee2e2" stroke="#fca5a5"/>
      <circle cx="35" cy="24" r="15" fill="#ef4444"/><text class="num" x="35" y="30" text-anchor="middle">6</text>
      <text class="step" x="35" y="55" text-anchor="middle">Doc</text>
    </g>
  </g>

  <text x="60" y="307" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">On the exam, documentation is not optional. It turns one fix into team knowledge.</text>
</svg>
