<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">AI agent access flow with identity gates</title>
  <desc id="desc">Diagram showing a user prompt flowing through an AI agent, identity policy, tool authorization, business systems, and audit logs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f061d"/>
      <stop offset="0.58" stop-color="#201035"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#c4b5fd"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="640" rx="28" fill="url(#bg)"/>
  <text x="600" y="70" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">AI Agent Access Flow</text>
  <text x="600" y="108" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Sensitive actions should pass through identity, policy, authorization, and audit controls.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="230" width="175" height="95" rx="18" fill="#1b0f2f" stroke="#a855f7" stroke-opacity="0.55"/>
    <text x="148" y="267" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">User Prompt</text>
    <text x="148" y="295" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Intent and context</text>

    <rect x="290" y="230" width="175" height="95" rx="18" fill="#1b0f2f" stroke="#a855f7" stroke-opacity="0.55"/>
    <text x="378" y="267" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">AI Agent</text>
    <text x="378" y="295" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Plans tool use</text>

    <rect x="520" y="210" width="190" height="135" rx="20" fill="url(#accent)"/>
    <text x="615" y="253" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="900">Policy Gate</text>
    <text x="615" y="283" text-anchor="middle" fill="#eef2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Identity, risk, scope</text>
    <text x="615" y="309" text-anchor="middle" fill="#eef2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">approval, data type</text>

    <rect x="765" y="230" width="175" height="95" rx="18" fill="#0f1b33" stroke="#38bdf8" stroke-opacity="0.55"/>
    <text x="853" y="267" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">Tool Call</text>
    <text x="853" y="295" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">API or connector</text>

    <rect x="990" y="230" width="175" height="95" rx="18" fill="#0f1b33" stroke="#38bdf8" stroke-opacity="0.55"/>
    <text x="1078" y="267" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">System</text>
    <text x="1078" y="295" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Data or action</text>

    <rect x="385" y="440" width="430" height="82" rx="20" fill="#111827" stroke="#94a3b8" stroke-opacity="0.35"/>
    <text x="600" y="474" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">Audit Trail</text>
    <text x="600" y="502" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Who initiated, which agent acted, which identity authorized, what changed</text>
  </g>

  <g fill="none" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M238 278H280"/>
    <path d="M468 278H510"/>
    <path d="M713 278H755"/>
    <path d="M943 278H980"/>
    <path d="M615 350V430"/>
    <path d="M853 330C825 382 770 422 705 440"/>
    <path d="M1078 330C1025 414 905 462 820 481"/>
  </g>

  <text x="615" y="382" text-anchor="middle" fill="#e9d5ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">log every sensitive decision</text>
</svg>
