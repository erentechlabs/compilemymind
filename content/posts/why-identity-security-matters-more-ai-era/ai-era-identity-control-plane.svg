<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">AI-era identity control plane</title>
  <desc id="desc">Diagram showing human users, non-human identities, and AI agents governed by identity security before accessing data and actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13051f"/>
      <stop offset="0.55" stop-color="#201035"/>
      <stop offset="1" stop-color="#071525"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#c4b5fd"/>
    </marker>
  </defs>

  <rect width="1200" height="640" rx="28" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#8b5cf6" stroke-width="1">
    <path d="M90 95H1110M90 175H1110M90 255H1110M90 335H1110M90 415H1110M90 495H1110"/>
    <path d="M170 70V570M330 70V570M490 70V570M650 70V570M810 70V570M970 70V570"/>
  </g>

  <text x="600" y="72" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Identity Is the AI Security Control Plane</text>
  <text x="600" y="108" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Humans, workloads, and AI agents all need governed access before they reach data or actions.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="175" width="255" height="86" rx="18" fill="#1b0f2f" stroke="#a855f7" stroke-opacity="0.55"/>
    <text x="198" y="211" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Human Users</text>
    <text x="198" y="238" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Employees, admins, partners</text>

    <rect x="70" y="305" width="255" height="86" rx="18" fill="#1b0f2f" stroke="#a855f7" stroke-opacity="0.55"/>
    <text x="198" y="341" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Non-Human IDs</text>
    <text x="198" y="368" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Apps, service accounts, APIs</text>

    <rect x="70" y="435" width="255" height="86" rx="18" fill="#1b0f2f" stroke="#a855f7" stroke-opacity="0.55"/>
    <text x="198" y="471" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">AI Agents</text>
    <text x="198" y="498" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Copilots, bots, workflows</text>

    <rect x="455" y="220" width="290" height="245" rx="24" fill="url(#gate)"/>
    <text x="600" y="265" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="900">Identity Security</text>
    <text x="600" y="303" text-anchor="middle" fill="#eef2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">MFA and passwordless</text>
    <text x="600" y="333" text-anchor="middle" fill="#eef2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Least privilege</text>
    <text x="600" y="363" text-anchor="middle" fill="#eef2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Conditional access</text>
    <text x="600" y="393" text-anchor="middle" fill="#eef2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Lifecycle and audit</text>
    <text x="600" y="423" text-anchor="middle" fill="#eef2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Risk-based policy</text>

    <rect x="875" y="205" width="255" height="95" rx="18" fill="#0f1b33" stroke="#38bdf8" stroke-opacity="0.5"/>
    <text x="1003" y="243" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Data</text>
    <text x="1003" y="271" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Files, email, records, code</text>

    <rect x="875" y="355" width="255" height="95" rx="18" fill="#0f1b33" stroke="#38bdf8" stroke-opacity="0.5"/>
    <text x="1003" y="393" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Actions</text>
    <text x="1003" y="421" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">APIs, changes, approvals</text>
  </g>

  <g fill="none" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M330 218H440"/>
    <path d="M330 348H440"/>
    <path d="M330 478H440"/>
    <path d="M750 300H860"/>
    <path d="M750 390H860"/>
  </g>
</svg>
