<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 640" role="img" aria-labelledby="title desc">
  <title id="title">SIEM XDR SOAR decision matrix</title>
  <desc id="desc">A matrix mapping security operations needs to SIEM, XDR, SOAR, or a combination.</desc>
  <rect width="1040" height="640" rx="28" fill="#100719"/>
  <text x="54" y="62" fill="#f5f3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700">When to Use Each</text>
  <text x="54" y="98" fill="#c7b8e6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">The right choice depends on the problem: visibility, detection quality, response speed, or operational consistency.</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <g fill="#211433" stroke="#392354">
      <rect x="54" y="136" width="932" height="58" rx="14"/>
      <rect x="54" y="212" width="932" height="58" rx="14"/>
      <rect x="54" y="288" width="932" height="58" rx="14"/>
      <rect x="54" y="364" width="932" height="58" rx="14"/>
      <rect x="54" y="440" width="932" height="58" rx="14"/>
      <rect x="54" y="516" width="932" height="58" rx="14"/>
    </g>

    <g fill="#f5f3ff" font-size="17" font-weight="700">
      <text x="82" y="171">Need broad log collection and compliance search</text>
      <text x="82" y="247">Need endpoint-email-identity attack correlation</text>
      <text x="82" y="323">Need repeatable containment and ticketing</text>
      <text x="82" y="399">Need long-term forensic retention</text>
      <text x="82" y="475">Need faster triage for common incidents</text>
      <text x="82" y="551">Need mature SOC coverage across many tools</text>
    </g>

    <g fill="#c7b8e6" font-size="14">
      <text x="570" y="171">Choose SIEM first</text>
      <text x="570" y="247">Choose XDR first</text>
      <text x="570" y="323">Choose SOAR or SIEM/SOAR</text>
      <text x="570" y="399">Choose SIEM with storage strategy</text>
      <text x="570" y="475">Use XDR plus SOAR playbooks</text>
      <text x="570" y="551">Use SIEM + XDR + SOAR together</text>
    </g>

    <g text-anchor="middle" font-size="14" font-weight="700">
      <rect x="792" y="151" width="152" height="28" rx="9" fill="#7c3aed"/>
      <text x="868" y="170" fill="#fff">SIEM</text>
      <rect x="792" y="227" width="152" height="28" rx="9" fill="#22d3ee"/>
      <text x="868" y="246" fill="#06121a">XDR</text>
      <rect x="792" y="303" width="152" height="28" rx="9" fill="#c084fc"/>
      <text x="868" y="322" fill="#160d25">SOAR</text>
      <rect x="792" y="379" width="152" height="28" rx="9" fill="#7c3aed"/>
      <text x="868" y="398" fill="#fff">SIEM</text>
      <rect x="792" y="455" width="152" height="28" rx="9" fill="#8b5cf6"/>
      <text x="868" y="474" fill="#fff">XDR + SOAR</text>
      <rect x="792" y="531" width="152" height="28" rx="9" fill="#22d3ee"/>
      <text x="868" y="550" fill="#06121a">All three</text>
    </g>
  </g>
</svg>
