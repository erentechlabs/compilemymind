<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">MS-900 domain weighting ranges</title>
  <desc id="desc">A horizontal range chart showing cloud concepts at 10 to 15 percent, Microsoft 365 apps and services at 45 to 50 percent, security compliance privacy and trust at 25 to 30 percent, and pricing licensing and support at 10 to 15 percent.</desc>
  <rect width="1000" height="560" rx="18" fill="#f8fafc"/>
  <text x="60" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">MS-900 Domain Weighting</text>
  <text x="60" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#4b5563">Ranges from the final Microsoft 365 Fundamentals study guide before retirement</text>

  <line x1="290" y1="165" x2="890" y2="165" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="290" y1="160" x2="290" y2="170" stroke="#64748b" stroke-width="2"/>
  <line x1="410" y1="160" x2="410" y2="170" stroke="#64748b" stroke-width="2"/>
  <line x1="530" y1="160" x2="530" y2="170" stroke="#64748b" stroke-width="2"/>
  <line x1="650" y1="160" x2="650" y2="170" stroke="#64748b" stroke-width="2"/>
  <line x1="770" y1="160" x2="770" y2="170" stroke="#64748b" stroke-width="2"/>
  <line x1="890" y1="160" x2="890" y2="170" stroke="#64748b" stroke-width="2"/>
  <text x="284" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">0%</text>
  <text x="398" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">10%</text>
  <text x="518" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">20%</text>
  <text x="638" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">30%</text>
  <text x="758" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">40%</text>
  <text x="878" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">50%</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="60" y="220" font-size="20" font-weight="700" fill="#0f172a">1. Cloud concepts</text>
    <rect x="410" y="195" width="60" height="34" rx="8" fill="#2563eb"/>
    <text x="485" y="219" font-size="16" font-weight="700" fill="#2563eb">10-15%</text>

    <text x="60" y="292" font-size="20" font-weight="700" fill="#0f172a">2. Apps and services</text>
    <rect x="830" y="267" width="60" height="34" rx="8" fill="#059669"/>
    <text x="720" y="291" font-size="16" font-weight="700" fill="#059669">45-50%</text>

    <text x="60" y="364" font-size="20" font-weight="700" fill="#0f172a">3. Security and compliance</text>
    <rect x="590" y="339" width="60" height="34" rx="8" fill="#7c3aed"/>
    <text x="665" y="363" font-size="16" font-weight="700" fill="#7c3aed">25-30%</text>

    <text x="60" y="436" font-size="20" font-weight="700" fill="#0f172a">4. Pricing and support</text>
    <rect x="410" y="411" width="60" height="34" rx="8" fill="#f97316"/>
    <text x="485" y="435" font-size="16" font-weight="700" fill="#f97316">10-15%</text>
  </g>

  <text x="60" y="505" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">Study priority: apps and services carry roughly half the assessment; security is the second largest area.</text>
</svg>
